apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-booking-service
  namespace: argocd
  labels:
    env: dev
    service: booking-service
spec:
  project: default
  source:
    repoURL: https://github.com/WashifyApp/booking-service.git
    targetRevision: develop
    path: helm
    helm:
      valueFiles:
        - https://raw.githubusercontent.com/WashifyApp/washify-gitops/main/dev/apps/booking-service/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: washify-dev-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
