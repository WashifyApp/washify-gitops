apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-auth
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/WashifyApp/washify-gitops.git'
    targetRevision: main
    path: charts/auth
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
   ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
