apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-auth
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/WashifyApp/washify-gitops.git'
    targetRevision: main
    path: charts/auth
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prod-env
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
