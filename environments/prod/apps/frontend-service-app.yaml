apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-frontend-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/WashifyApp/washify-gitops.git'
    targetRevision: main
    path: charts/base-service
    helm:
      values: |
        image:
          repository: ghcr.io/washifyapp/frontend-service
          tag: latest
        containerPort: 8080
        replicaCount: 3
      valueFiles:
        - ../../global-values/prod-values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prod-env
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
