replicaCount: 3
namespace: prod-ns

image:
  repository: ghcr.io/washifyapp/notification-service
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 80

configMap:
  name: washify-config

secret:
  name: washify-secret
  jwtSecret: "prod-secret-key"
  smtpUser: "prod-user"
  smtpPass: "prod-pass"
  twilioSid: "AC-prod"
  twilioToken: "token-prod"
  twilioPhone: "+1098765432"

config:
  mongoUrl: "mongodb://mongodb:27017"
  smtpServer: "smtp.gmail.com"
  smtpPort: "587"

livenessProbe:
  path: /docs
  port: 8000
  initialDelaySeconds: 10
  periodSeconds: 15
