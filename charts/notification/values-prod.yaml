replicaCount: 3
namespace: prod-ns

image:
  repository: aravindroy1/washify-notification
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 80

configMap:
  name: notification-config

secret:
  name: notification-secret
  jwtSecretGibberish: ""
  smtpUserGibberish: ""
  smtpPassGibberish: ""
  twilitwilioSidGibberishoSid: ""
  twilioTokenGibberish: ""
  twilioPhoneGibberish: ""
  mongoUrl: "mongodb://mongodb:27017"
  smtpServer: "smtp.gmail.com"
  smtpPort: "587"

livenessProbe:
  path: /docs
  port: 8000
  initialDelaySeconds: 15
  periodSeconds: 20
