apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.configMap.name }}
  namespace: {{ .Values.namespace }}
data:
  MONGO_URL: {{ .Values.config.mongoUrl | default "mongodb://mongodb:27017" | quote }}
  SMTP_SERVER: {{ .Values.config.smtpServer | default "smtp.gmail.com" | quote }}
  SMTP_PORT: {{ .Values.config.smtpPort | default "587" | quote }}
