# SELF-CONTAINED DEV VALUES (NO COMMON VALUES.YAML)
# ------------------------------------------------
replicaCount: 1
namespace: dev-ns

image:
  repository: aravindroy1/washify-notification
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 80

configMap:
  name: washify-config

secret:
  name: washify-secret

livenessProbe:
  path: /docs
  port: 8000
  initialDelaySeconds: 10
  periodSeconds: 15


# --- OVERRIDES FOR DEV ---
replicaCount: 1
image:
  repository: ghcr.io/washifyapp/notification-service
  tag: latest
resources:
  limits: { cpu: 200m, memory: 256Mi }

config:
  mongoUrl: "mongodb://mongodb:27017"
  smtpServer: "smtp.gmail.com"
  smtpPort: "587"

secret:
  jwtSecret: "dev-secret-key"
  smtpUser: "dev-user"
  smtpPass: "dev-pass"
  twilioSid: "AC-dev"
  twilioToken: "token-dev"
  twilioPhone: "+1234567890"

