replicaCount: 1
namespace: dev-ns

image:
  repository: aravindroy1/washify-auth
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000
  targetPort: 8001

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 80

configMap:
  name: auth-config

secret:
  name: auth-secret
  jwtSecret: ""

config:
  mongoUrl: "mongodb://mongodb:27017"

livenessProbe:
  path: /docs
  port: 8001
  initialDelaySeconds: 10
  periodSeconds: 15
