# SELF-CONTAINED PROD VALUES (NO COMMON VALUES.YAML)
# -------------------------------------------------
replicaCount: 3
namespace: prod-ns

image:
  repository: aravindroy1/washify-auth
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 80

configMap:
  name: washify-config

secret:
  name: washify-secret
  jwtSecret: mysupersecretkey

livenessProbe:
  path: /docs
  port: 8000
  initialDelaySeconds: 10
  periodSeconds: 15

config:
  mongoUrl: "mongodb://mongodb.prod-ns.svc.cluster.local:27017/washify"

secret:
  jwtSecret: "prod-secret-key"




