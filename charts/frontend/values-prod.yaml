replicaCount: 3
namespace: prod-ns

image:
  repository: aravindroy1/washify-frontend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 80

livenessProbe:
  path: /
  port: 80
  initialDelaySeconds: 30
  periodSeconds: 15
