replicaCount: 1
namespace: dev-ns

image:
  repository: aravindroy1/washify-frontend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

livenessProbe:
  path: /
  port: 8080
  initialDelaySeconds: 30
  periodSeconds: 15
