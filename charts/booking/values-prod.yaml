replicaCount: 3
namespace: prod-ns

image:
  repository: aravindroy1/washify-booking
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 80

configMap:
  name: booking-config

secret:
  name: booking-secret
  jwtSecretGibberish: ""

config:
  mongoUrl: "mongodb://mongodb:27017"
  notificationUrl: "http://notification-service.prod-ns.svc.cluster.local:8000"

livenessProbe:
  path: /docs
  port: 8000
  initialDelaySeconds: 15
  periodSeconds: 20
