# SELF-CONTAINED PROD VALUES (NO COMMON VALUES.YAML)
# -------------------------------------------------
replicaCount: 1
namespace: prod-ns

image:
  repository: aravindroy1/washify-booking
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 80

configMap:
  name: washify-config

secret:
  name: washify-secret

livenessProbe:
  path: /docs
  port: 8000
  initialDelaySeconds: 10
  periodSeconds: 15


# --- OVERRIDES FOR PROD ---
replicaCount: 3
image:
  repository: ghcr.io/washifyapp/booking-service
  tag: latest
resources:
  limits: { cpu: 1000m, memory: 1Gi }

config:
  mongoUrl: "mongodb://mongodb.prod-ns.svc.cluster.local:27017/washify"
  notificationUrl: "http://notification-service.prod-ns.svc.cluster.local:8000"

secret:
  jwtSecret: "prod-secret-key"

