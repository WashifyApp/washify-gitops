apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-httproute
  namespace: argocd  # This route lives in the argocd namespace
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: gateway-ns
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /argocd
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: argocd-server
      port: 80
