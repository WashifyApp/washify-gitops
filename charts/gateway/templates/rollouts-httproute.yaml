apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: rollouts-dashboard-route
  namespace: argo-rollouts
spec:
  parentRefs:
  - name: washify-gateway
    namespace: gateway-ns
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /rollouts
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: argo-rollouts-dashboard
      port: 3100
